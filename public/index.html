<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Price Watch Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="bg-shape shape-a" aria-hidden="true"></div>
    <div class="bg-shape shape-b" aria-hidden="true"></div>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Price Watch</p>
          <h1>Live Market Rule Dashboard</h1>
          <p class="subtitle">Track stock and crypto thresholds in real time from your local bot.</p>
        </div>
        <div class="hero-actions">
          <button id="checkNowBtn" class="button">Check Now</button>
          <p id="lastRefreshText" class="refresh">Waiting for first update...</p>
        </div>
      </header>

      <section class="status-strip" id="statusStrip">
        <div class="pill">Status: <strong id="runningValue">Unknown</strong></div>
        <div class="pill">Check Interval: <strong id="intervalValue">--</strong></div>
        <div class="pill">Cooldown: <strong id="cooldownValue">--</strong></div>
        <div class="pill">Last Check: <strong id="lastCheckValue">--</strong></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Rules</h2>
          <p id="errorText" class="error-text" hidden></p>
        </div>
        <div id="rulesGrid" class="rules-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Recent Alerts</h2>
          <p class="hint">Newest alerts first</p>
        </div>
        <div id="alertsList" class="alerts-list"></div>
      </section>
    </main>

    <template id="ruleCardTemplate">
      <article class="rule-card">
        <div class="rule-top">
          <h3 class="rule-symbol"></h3>
          <span class="rule-market"></span>
        </div>
        <div class="rule-price"></div>
        <div class="rule-target"></div>
        <div class="rule-status-row">
          <span class="status-badge"></span>
        </div>
      </article>
    </template>

    <template id="alertItemTemplate">
      <article class="alert-item">
        <div class="alert-text"></div>
        <div class="alert-time"></div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
